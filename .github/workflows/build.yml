name: macOS Build (ARM & Intel)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-latest   # Apple Silicon
            arch: arm64
            arch_suffix: darwin-arm64
          - runner: macos-latest   # Intel
            arch: x86_64
            arch_suffix: darwin-x64
    runs-on: ${{ matrix.runner }}

    env:
      APP_NAME: CoinPriceBar
      PYTHON_VERSION: "3.14"
      ARCH: ${{ matrix.arch }}
      ARCH_SUFFIX: ${{ matrix.arch_suffix }}
      DMG_NAME: CoinPriceBar-${{ matrix.arch_suffix }}.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install py2app

      - name: Build .app with py2app
        env:
          ARCHFLAGS: "-arch $ARCH"
          APP_VERSION: "0.0.0-${{ github.sha }}"
        run: |
          echo "Building for $ARCH ..."
          python setup.py py2app
          # 体积检查（可选）
          du -sh dist/${{ env.APP_NAME }}.app || true
          # 验证架构（可选）
          file "dist/${{ env.APP_NAME }}.app/Contents/MacOS/${{ env.APP_NAME }}" || true

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "${{ env.APP_NAME }}" \
            --volicon "icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${{ env.APP_NAME }}.app" 200 190 \
            --app-drop-link 400 190 \
            "dist/${{ env.DMG_NAME }}" \
            "dist/${{ env.APP_NAME }}.app"
          ls -al dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.ARCH_SUFFIX }}
          path: |
            dist/${{ env.APP_NAME }}.app
            dist/${{ env.DMG_NAME }}